services:
  db-primary:
    image: postgres:16-alpine
    container_name: pg-primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    networks:
      - pg-net
    # Injetamos a configuração de replicação diretamente no arquivo de configuração no boot
    entrypoint: 
      - sh
      - -c
      - |
        echo "host replication all 0.0.0.0/0 trust" >> /usr/local/share/postgresql/pg_hba.conf.sample
        docker-entrypoint.sh postgres -c wal_level=replica -c max_wal_senders=10 -c max_replication_slots=10 -c hot_standby=on

  db-replica:
    image: postgres:16-alpine
    container_name: pg-replica
    depends_on:
      - db-primary
    ports:
      - "5433:5432"
    networks:
      - pg-net
    environment:
      PGPASSWORD: postgres
    entrypoint: >
      sh -c "
      rm -rf /var/lib/postgresql/data/* &&
      until pg_basebackup -h pg-primary -D /var/lib/postgresql/data -U postgres -vP -R; do
        echo 'Aguardando o primary subir...'
        sleep 2
      done;
      docker-entrypoint.sh postgres"

networks:
  pg-net:
    driver: bridge